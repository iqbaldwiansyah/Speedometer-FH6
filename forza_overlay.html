<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <title>Forza Horizon 6 — Gauge Overlay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Oxanium:wght@500;600;700&family=Rajdhani:wght@500;600;700&family=Orbitron:wght@500;700&family=Roboto+Mono:wght@500;700&family=Oswald:wght@500;700&family=Teko:wght@500;700&family=Audiowide&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #0b0d10;
      --bezel-hi: #3a3f47;
      --bezel-lo: #12141a;
      --accent-speed: #4fd8e8;
      --accent-rpm: #ffb347;
      --redline: #ff3b30;
      --text-bright: #eef2f6;
      --text-dim: #8a93a1;
      --face: 'Rajdhani', sans-serif;
      --digital: 'Oxanium', monospace;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      height: 100%;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      font-family: var(--face);
      color: var(--text-bright);
      overflow: hidden;
    }

    .topbar {
      position: fixed;
      top: 14px;
      left: 14px;
      right: 14px;
      display: flex;
      align-items: center;
      gap: 18px;
      font-size: 13px;
      color: var(--text-dim);
      z-index: 20;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #666;
      box-shadow: 0 0 6px #666;
      transition: .3s;
    }

    .status.live .dot {
      background: #3ddc84;
      box-shadow: 0 0 8px #3ddc84;
    }

    .topbar button,
    .topbar label {
      background: rgba(255, 255, 255, .04);
      border: 1px solid rgba(255, 255, 255, .1);
      color: var(--text-dim);
      border-radius: 6px;
      padding: 5px 9px;
      font-family: var(--face);
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .topbar button:hover,
    .topbar label:hover {
      color: var(--text-bright);
      border-color: rgba(255, 255, 255, .3);
    }

    .spacer {
      flex: 1;
    }

    .settings-panel {
      position: fixed;
      top: 50px;
      left: 14px;
      z-index: 30;
      background: #13151a;
      border: 1px solid rgba(255, 255, 255, .1);
      border-radius: 10px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, .5);
      min-width: 240px;
    }

    .settings-panel label {
      font-size: 11px;
      letter-spacing: 1px;
      color: var(--text-dim);
    }

    .settings-panel input[type=text] {
      background: #0b0d10;
      border: 1px solid rgba(255, 255, 255, .12);
      color: var(--text-bright);
      border-radius: 6px;
      padding: 7px 9px;
      font-family: var(--digital);
      font-size: 13px;
    }

    .settings-panel .row {
      display: flex;
      gap: 8px;
    }

    .settings-panel button {
      background: var(--accent-speed);
      color: #04282d;
      border: none;
      border-radius: 6px;
      padding: 7px 12px;
      font-weight: 700;
      cursor: pointer;
      font-family: var(--face);
    }

    .cluster {
      display: flex;
      align-items: center;

    }

    .gauge-wrap {
      position: relative;
      width: 280px;
      height: 280px;
    }

    .dial-bg {
      position: absolute;
      inset: 6px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, var(--bezel-hi), var(--bezel-lo) 70%);
      background-size: cover;
      background-position: center;
      box-shadow:
        inset 0 0 0 2px rgba(255, 255, 255, .06),
        inset 0 6px 22px rgba(0, 0, 0, .65),
        0 0 0 8px #06070a,
        0 10px 26px rgba(0, 0, 0, .55);
      opacity: var(--bg-opacity, 1.0);
      filter: brightness(var(--bg-brightness, 1.0));
    }

    .gauge-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .ticks line {
      stroke: var(--tick-dim, var(--text-dim));
      stroke-width: 1.4;
    }

    .ticks line.major {
      stroke: var(--tick-bright, var(--text-bright));
      stroke-width: 2.4;
    }



    .redline-arc {
      fill: none;
      stroke: var(--redline);
      stroke-width: 6;
      stroke-linecap: round;
      opacity: .9;
      filter: drop-shadow(0 0 5px var(--redline));
    }

    .needle {
      stroke-linecap: round;
      stroke-width: 4;
      transform-origin: 100px 100px;
      transition: transform .08s linear;
      filter: drop-shadow(0 2px 3px rgba(0, 0, 0, .7));
    }

    #speedNeedle {
      stroke: var(--accent-speed);
    }

    #rpmNeedle {
      stroke: var(--accent-rpm);
    }

    #rpmNeedle.redzone {
      stroke: var(--redline);
    }

    .hub {
      fill: #1a1d22;
      stroke: #4a4f57;
      stroke-width: 1;
    }

    .label {
      position: absolute;
      top: 16px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 12px;
      letter-spacing: 3px;
      color: var(--text-dim);
      font-weight: 600;
    }

    .readout {
      position: absolute;
      bottom: 46px;
      left: 0;
      right: 0;
      text-align: center;
      width: max-content;
      margin: 0 auto;
      background: var(--digital-bg, transparent);
      border: var(--digital-border, none);
      padding: var(--digital-padding, 0);
      border-radius: var(--digital-radius, 0);
      box-shadow: var(--digital-shadow, none);
    }

    .value {
      font-family: var(--digital);
      font-size: 36px;
      font-weight: 600;
      letter-spacing: 1px;
      line-height: 1;
    }

    .unit {
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--text-dim);
      margin-top: 3px;
    }



    .center-console {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: var(--text-dim);
      width: 150px;
    }

    .gear-display {
      width: 56px;
      height: 56px;
      border-radius: 10px;
      background: #13151a;
      border: 1px solid rgba(255, 255, 255, .08);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--digital);
      font-size: 26px;
      color: var(--text-bright);
      box-shadow: inset 0 2px 6px rgba(0, 0, 0, .6);
    }

    .console-label {
      font-size: 10px;
      letter-spacing: 2px;
    }

    .logo-img {
      width: 54px;
      height: 54px;
      object-fit: contain;
      background: transparent;
      filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.5));
    }

    .pi-badge {
      display: flex;
      align-items: stretch;
      border-radius: 4px;
      border: 2px solid #ffffff;
      overflow: hidden;
      font-family: var(--digital);
      font-weight: 700;
      color: #ffffff;
      box-shadow: 0 4px 12px rgba(0, 0, 0, .4);
      margin-top: 4px;
    }

    .class-letter {
      padding: 2px 6px;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--class-color, #165edb);
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
    }

    .pi-number {
      padding: 2px 8px;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.85);
    }

    .car-name {
      font-family: var(--face);
      font-size: 13px;
      font-weight: 600;
      color: #eef2f6;
      /* hardcoded */
      text-align: center;
      max-width: 148px;
      line-height: 1.25;
      outline: none;
      cursor: text;
      padding: 2px 4px;
      border-radius: 4px;
    }

    .car-name:empty::before,
    .car-name.placeholder {
      color: var(--text-dim);
      font-weight: 500;
    }

    .car-name:hover {
      background: rgba(255, 255, 255, .05);
    }

    .car-name:focus {
      background: rgba(255, 255, 255, .08);
      box-shadow: 0 0 0 1px rgba(255, 255, 255, .15);
    }

    .red-group {
      color: var(--color-red-group, #8a93a1) !important;
    }

    .green-group {
      color: var(--color-green-group, #eef2f6) !important;
    }

    .yellow-group {
      color: var(--color-yellow-group, #eef2f6) !important;
    }

    .ticks text {
      fill: var(--color-yellow-group, #eef2f6) !important;
      font-family: var(--tick-font, var(--face));
      font-weight: 600;
      font-size: 11px;
      text-anchor: middle;
      dominant-baseline: middle;
    }
  </style>
  <script src="config.js"></script>
  <script>
    function applyConfig(conf) {
      const root = document.documentElement;
      root.style.setProperty('--face', conf.font_utama);
      root.style.setProperty('--digital', conf.font_angka);
      root.style.setProperty('--tick-font', conf.font_angka_speedo || conf.font_utama);
      root.style.setProperty('--text-bright', conf.warna_teks_terang);
      root.style.setProperty('--text-dim', conf.warna_teks_gelap);
      root.style.setProperty('--accent-speed', conf.warna_jarum_speedo);
      root.style.setProperty('--accent-rpm', conf.warna_jarum_tacho);
      root.style.setProperty('--redline', conf.warna_redline);
      root.style.setProperty('--tick-dim', conf.warna_garis_biasa);
      root.style.setProperty('--tick-bright', conf.warna_garis_tebal);
      root.style.setProperty('--bg', conf.warna_background_utama);

      root.style.setProperty('--color-red-group', conf.warna_grup_merah);
      root.style.setProperty('--color-green-group', conf.warna_grup_hijau);
      root.style.setProperty('--color-yellow-group', conf.warna_grup_kuning);

      const drawBox = conf.tampilkan_kotak_digital === "true" || conf.tampilkan_kotak_digital === true;
      root.style.setProperty('--digital-bg', drawBox ? 'rgba(0,0,0,0.65)' : 'transparent');
      root.style.setProperty('--digital-border', drawBox ? '1px solid rgba(255,255,255,0.1)' : 'none');
      root.style.setProperty('--digital-padding', drawBox ? '6px 12px' : '0');
      root.style.setProperty('--digital-radius', drawBox ? '8px' : '0');
      root.style.setProperty('--digital-shadow', drawBox ? 'inset 0 2px 6px rgba(0,0,0,0.8)' : 'none');

      root.style.setProperty('--bg-opacity', conf.opasitas_gambar || "1.0");
      root.style.setProperty('--bg-brightness', conf.kecerahan_gambar || "1.0");
    }

    if (typeof OVERLAY_CONFIG !== 'undefined') {
      applyConfig(OVERLAY_CONFIG);
    }

    window.addEventListener('message', (e) => {
      if (e.data && e.data.type === 'update_config') {
        applyConfig(e.data.config);
      }
    });
  </script>
</head>

<body>

  <div class="topbar">
    <div class="status" id="statusDot">
      <span class="dot"></span>
      <span id="statusText">Demo mode</span>
    </div>
    <div class="spacer"></div>
    <button id="settingsBtn" title="Pengaturan koneksi">⚙ Koneksi</button>
  </div>

  <div class="settings-panel" id="settingsPanel" hidden>
    <label>WebSocket relay URL</label>
    <div class="row">
      <input type="text" id="wsUrlInput" value="ws://localhost:8765" style="flex:1;">
      <button id="connectBtn">Hubungkan</button>
    </div>
  </div>

  <div class="cluster">

    <div class="gauge-wrap" data-gauge="speed">
      <div class="dial-bg" id="speedDialBg"></div>
      <svg class="gauge-svg" viewBox="0 0 200 200">
        <g class="ticks" id="speedTicks"></g>
        <line class="needle" id="speedNeedle" x1="100" y1="100" x2="100" y2="24" />
        <circle class="hub" cx="100" cy="100" r="6" />
      </svg>
      <div class="label"></div>
      <div class="readout">
        <div class="value green-group" id="speedValue">0</div>
        <div class="unit red-group">KM/H</div>
      </div>

    </div>

    <div class="center-console">
      <div class="gear-display" id="gearDisplay" style="color: #ffffff !important;">N</div>
      <div class="console-label" style="color: #ffffff !important;">GEAR</div>

      <img class="logo-img" id="teamLogo" src="https://i.ibb.co.com/xSXFLCXx/Chat-GPT-Image-Feb-12-2026-11-28-56-AM.png"
        alt="MKR Interactive logo">

      <div class="pi-badge" id="piBadgeBox" style="--class-color: #165edb;">
        <div class="class-letter" id="classBadge">S2</div>
        <div class="pi-number" id="piValue">800</div>
      </div>
      <div class="car-name placeholder" id="carName" contenteditable="true" spellcheck="false">Klik untuk isi nama mobil
      </div>
    </div>

    <div class="gauge-wrap" data-gauge="rpm">
      <div class="dial-bg" id="rpmDialBg"></div>
      <svg class="gauge-svg" viewBox="0 0 200 200">
        <g class="ticks" id="rpmTicks"></g>
        <path class="redline-arc" id="rpmRedlineArc"></path>
        <line class="needle" id="rpmNeedle" x1="100" y1="100" x2="100" y2="24" />
        <circle class="hub" cx="100" cy="100" r="6" />
      </svg>
      <div class="label"></div>
      <div class="readout">
        <div class="value green-group" id="rpmValue">0.0</div>
        <div class="unit red-group">RPM x1000</div>
      </div>

    </div>

  </div>

  <script>

    const SPEED_MAX = 320;
    let rpmMax = 8000;

    const speedNeedle = document.getElementById('speedNeedle');
    const rpmNeedle = document.getElementById('rpmNeedle');
    const speedValue = document.getElementById('speedValue');
    const rpmValue = document.getElementById('rpmValue');
    const speedTicks = document.getElementById('speedTicks');
    const rpmTicks = document.getElementById('rpmTicks');
    const rpmRedlineArc = document.getElementById('rpmRedlineArc');
    const gearDisplay = document.getElementById('gearDisplay');
    const classBadge = document.getElementById('classBadge');
    const piValue = document.getElementById('piValue');
    const carName = document.getElementById('carName');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');

    // Forza class scale: 0=D ... 7=X
    const CLASS_NAMES = ['D', 'C', 'B', 'A', 'S1', 'S2', 'R', 'X'];
    const CLASS_COLORS = ['#42bdf4', '#ffc533', '#ff632c', '#ff1a46', '#b960e8', '#165edb', '#d61a9c', '#19d858'];

    const CAR_NAME_PLACEHOLDER = 'Klik untuk isi nama mobil';
    let manualOverride = false;
    carName.addEventListener('focus', () => {
      if (carName.classList.contains('placeholder') && carName.textContent === CAR_NAME_PLACEHOLDER) {
        carName.textContent = '';
      }
      carName.classList.remove('placeholder');
    });
    carName.addEventListener('input', () => { manualOverride = true; });
    carName.addEventListener('blur', () => {
      if (carName.textContent.trim() === '') {
        carName.textContent = CAR_NAME_PLACEHOLDER;
        carName.classList.add('placeholder');
        manualOverride = false;
      }
    });

    let lastOrdinal = null;
    function applyCarName(ordinal, nameFromRelay) {
      if (ordinal === undefined || ordinal === null) return;
      if (ordinal === lastOrdinal) return; // mobil belum berganti, jangan timpa edit manual
      lastOrdinal = ordinal;
      manualOverride = false;
      if (nameFromRelay) {
        carName.textContent = nameFromRelay;
        carName.classList.remove('placeholder');
      } else {
        carName.textContent = `Mobil tidak dikenal (ID ${ordinal})`;
        carName.classList.add('placeholder');
      }
    }

    function applyCarInfo(carClass, pi) {
      if (carClass === undefined || carClass === null) return;
      const idx = Math.max(0, Math.min(CLASS_NAMES.length - 1, Math.round(carClass)));
      classBadge.textContent = CLASS_NAMES[idx];
      document.getElementById('piBadgeBox').style.setProperty('--class-color', CLASS_COLORS[idx]);
      if (pi !== undefined && pi !== null) piValue.textContent = Math.round(pi);
    }

    // ---- geometry helpers ----
    function angleToPoint(angleDeg, radius) {
      const t = (angleDeg - 90) * Math.PI / 180;
      return [100 + radius * Math.cos(t), 100 + radius * Math.sin(t)];
    }
    function valueToAngle(value, min, max) {
      const f = Math.min(1, Math.max(0, (value - min) / (max - min)));
      return -130 + f * 260;
    }
    function describeArc(startAngle, endAngle, radius) {
      const [x1, y1] = angleToPoint(startAngle, radius);
      const [x2, y2] = angleToPoint(endAngle, radius);
      const largeArc = (endAngle - startAngle) > 180 ? 1 : 0;
      return `M ${x1.toFixed(2)} ${y1.toFixed(2)} A ${radius} ${radius} 0 ${largeArc} 1 ${x2.toFixed(2)} ${y2.toFixed(2)}`;
    }

    function generateTicks(groupEl, min, max, step, majorStep, labelFn) {
      groupEl.innerHTML = '';
      for (let v = min; v <= max + 1e-6; v += step) {
        const angle = valueToAngle(v, min, max);
        const isMajor = Math.round(v) % majorStep === 0;
        const [x1, y1] = angleToPoint(angle, isMajor ? 70 : 80);
        const [x2, y2] = angleToPoint(angle, 88);
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', x1); line.setAttribute('y1', y1);
        line.setAttribute('x2', x2); line.setAttribute('y2', y2);
        if (isMajor) line.classList.add('major');
        groupEl.appendChild(line);
        if (isMajor) {
          const [tx, ty] = angleToPoint(angle, 58);
          const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
          text.setAttribute('x', tx); text.setAttribute('y', ty);
          text.textContent = labelFn(v);
          groupEl.appendChild(text);
        }
      }
    }

    function drawRedline(maxRpmActual) {
      const startVal = maxRpmActual * 0.85;
      const startAngle = valueToAngle(startVal, 0, rpmMax);
      const endAngle = valueToAngle(maxRpmActual, 0, rpmMax);
      rpmRedlineArc.setAttribute('d', describeArc(startAngle, endAngle, 80));
    }

    function rebuildRpmScale(maxRpmActual) {
      rpmMax = Math.max(4000, Math.ceil(maxRpmActual / 1000) * 1000);
      generateTicks(rpmTicks, 0, rpmMax, 500, 1000, v => String(v / 1000));
      drawRedline(maxRpmActual);
    }

    generateTicks(speedTicks, 0, SPEED_MAX, 10, 40, v => String(v));
    rebuildRpmScale(7500);

    // ---- telemetry application ----
    let lastMaxRpm = 7500;
    function applyTelemetry(d) {
      if (d.maxRpm && Math.abs(d.maxRpm - lastMaxRpm) > 250) {
        lastMaxRpm = d.maxRpm;
        rebuildRpmScale(d.maxRpm);
      }
      const sAngle = valueToAngle(d.speedKmh, 0, SPEED_MAX);
      speedNeedle.style.transform = `rotate(${sAngle}deg)`;
      speedValue.textContent = Math.round(d.speedKmh);

      const rAngle = valueToAngle(d.rpm, 0, rpmMax);
      rpmNeedle.style.transform = `rotate(${rAngle}deg)`;
      rpmValue.textContent = (d.rpm / 1000).toFixed(1);
      rpmNeedle.classList.toggle('redzone', lastMaxRpm > 0 && d.rpm / lastMaxRpm > 0.9);

      let gText = String(d.gear);
      if (d.gear === 0) gText = 'R';
      else if (d.gear === 11 || d.gear === undefined) gText = 'N';
      gearDisplay.textContent = gText;

      applyCarInfo(d.carClass, d.carPI);
      applyCarName(d.carOrdinal, d.carName);
    }

    // ---- WebSocket connection + demo fallback ----
    let ws = null;
    let demoTimer = null;
    let demoT = 0;

    function setStatus(live) {
      statusDot.classList.toggle('live', live);
      statusText.textContent = live ? 'Live data' : 'Demo mode';
    }

    function startDemo() {
      if (demoTimer) return;
      demoTimer = setInterval(() => {
        demoT += 0.05;
        const speed = Math.max(0, 90 + Math.sin(demoT) * 75 + (Math.random() - 0.5) * 4);
        const rpm = Math.max(900, 3800 + Math.sin(demoT * 2.3) * 2900 + (Math.random() - 0.5) * 150);
        const gear = Math.min(6, Math.max(1, Math.round(speed / 42) + 1));
        applyTelemetry({ speedKmh: speed, rpm: rpm, maxRpm: 7500, gear: gear, carClass: 5, carPI: 800, carOrdinal: 1131, carName: "2010 Ferrari 458 Italia" });
      }, 80);
    }
    function stopDemo() {
      if (demoTimer) { clearInterval(demoTimer); demoTimer = null; }
    }

    function connect(url) {
      try { if (ws) ws.close(); } catch (e) { }
      setStatus(false);
      try {
        ws = new WebSocket(url);
        ws.onopen = () => { setStatus(true); stopDemo(); };
        ws.onmessage = (ev) => {
          try { applyTelemetry(JSON.parse(ev.data)); } catch (e) { }
        };
        ws.onclose = () => { setStatus(false); startDemo(); };
        ws.onerror = () => { try { ws.close(); } catch (e) { } };
      } catch (e) {
        startDemo();
      }
    }

    startDemo();
    connect(document.getElementById('wsUrlInput').value);

    // ---- UI: settings panel ----
    const settingsBtn = document.getElementById('settingsBtn');
    const settingsPanel = document.getElementById('settingsPanel');
    settingsBtn.addEventListener('click', () => { settingsPanel.hidden = !settingsPanel.hidden; });
    document.getElementById('connectBtn').addEventListener('click', () => {
      connect(document.getElementById('wsUrlInput').value);
    });



    // ---- Auto-load custom dial images if available ----
    function loadCustomDial(bgId, imagePath) {
      const img = new Image();
      img.onload = () => {
        document.getElementById(bgId).style.backgroundImage = `url('${imagePath}')`;
      };
      img.src = imagePath + '?t=' + new Date().getTime(); // Prevent caching issues during dev
    }
    loadCustomDial('speedDialBg', 'image/speedometer.png');
    loadCustomDial('rpmDialBg', 'image/tacho.png');
  </script>
</body>

</html>
